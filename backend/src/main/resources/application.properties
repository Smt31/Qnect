# Basic app
spring.application.name=Qpoint
server.port=8080

#logging.level.org.springframework.boot.context.config=DEBUG
# NEON DB CONFIGURATION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE SETTINGS
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Basic fallback user (dev only)
spring.security.user.name=demo
spring.security.user.password=demo

# SMTP Configuration (Gmail App Password)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT settings
jwt.secret=${JWT_SECRET:ThisIsAVeryLongAndSecureSecretKeyForJwtReplaceInProd1234567890}
# Default access token expiry: 10 hours (in ms) unless overridden via env
jwt.access.expiration=${JWT_ACCESS_EXPIRATION:36000000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:2592000000}

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.Qpoint=DEBUG


# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}