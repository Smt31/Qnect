# Basic app
spring.application.name=Qpoint
server.port=8080

# NEON DB CONFIGURATION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings (optimized for Neon PostgreSQL)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=120000

# JPA / HIBERNATE SETTINGS
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# HIBERNATE PERFORMANCE OPTIMIZATIONS (N+1 Prevention)
# =====================================================
# Enable batch fetching to reduce N+1 queries
spring.jpa.properties.hibernate.default_batch_fetch_size=25
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Query optimizations
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true

# Connection and statement management
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ===============================
# REDIS CONFIGURATION (Upstash)
# ===============================
spring.cache.type=redis

spring.data.redis.host=fitting-mustang-57575.upstash.io
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
spring.data.redis.timeout=60000


spring.jpa.open-in-view=false

# Basic fallback user (dev only)
spring.security.user.name=demo
spring.security.user.password=demo


# Brevo (Sendinblue) Email API Configuration
brevo.api.key=${BREVO_API_KEY}
brevo.from.email=${BREVO_FROM_EMAIL}
brevo.from.name=Qpoint

# JWT settings
jwt.secret=${JWT_SECRET}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.Qpoint=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.model.primary=gemini-2.5-flash
gemini.model.fallback=gemini-2.5-flash-lite

# NewsAPI Configuration
newsapi.key=${NEWSAPI_KEY}