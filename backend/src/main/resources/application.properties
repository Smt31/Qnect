# Basic app
spring.application.name=Qpoint
server.port=8080

#logging.level.org.springframework.boot.context.config=DEBUG
# NEON DB CONFIGURATION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE SETTINGS
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false


spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =====================================================
# HIBERNATE SECOND-LEVEL CACHE CONFIGURATION (EhCache)
# =====================================================
# Enable second-level cache globally
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
# Enable query cache for frequently-used queries
spring.jpa.properties.hibernate.cache.use_query_cache=true
# Use JCache (JSR-107) as the cache provider with EhCache implementation
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
# Point to our EhCache configuration file
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider
spring.jpa.properties.hibernate.javax.cache.uri=classpath:ehcache.xml
# Generate statistics for cache monitoring (useful for debugging)
spring.jpa.properties.hibernate.generate_statistics=false
# Missing cache creation mode - create if not defined in ehcache.xml
spring.jpa.properties.hibernate.javax.cache.missing_cache_strategy=create
spring.cache.jcache.config=classpath:ehcache.xml




# Basic fallback user (dev only)
spring.security.user.name=demo
spring.security.user.password=demo

# SMTP Configuration (Gmail App Password)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}

spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT settings
jwt.secret=${JWT_SECRET}
# Default access token expiry: 10 hours (in ms) unless overridden via env
jwt.access.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.Qpoint=DEBUG
# Cache logging - uncomment to see detailed cache activity
logging.level.org.hibernate.cache=DEBUG
logging.level.org.hibernate.stat=DEBUG
logging.level.org.ehcache=INFO


# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}