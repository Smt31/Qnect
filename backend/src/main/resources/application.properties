# Basic app
spring.application.name=Qpoint
server.port=8080

# NEON DB CONFIGURATION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings (optimized for Neon PostgreSQL)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA / HIBERNATE SETTINGS
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true




# =====================================================
# SPRING CACHE WITH CAFFEINE
# =====================================================
spring.cache.type=caffeine
# Cache specifications: maximumSize, expireAfterWrite (seconds)
# Format: cacheName=maximumSize,expireAfterWrite=<seconds>s
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=600s

spring.jpa.open-in-view=false

# Basic fallback user (dev only)
spring.security.user.name=demo
spring.security.user.password=demo


# SMTP Configuration (Gmail App Password)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT settings
jwt.secret=${JWT_SECRET}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.Qpoint=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.model.primary=gemini-2.5-flash
gemini.model.fallback=gemini-2.5-flash-lite

# NewsAPI Configuration
newsapi.key=${NEWSAPI_KEY}