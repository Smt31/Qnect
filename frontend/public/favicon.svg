<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- White Background Shape -->
    <rect width="100" height="100" rx="16" fill="white" />
    
    <!-- Red Accent/Completion Line (Subtle) -->
    <path
